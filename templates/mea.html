<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MEA Upload</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body>
<header class="topbar">
    <div><h1>MEA Bill Reader</h1><p>อัปโหลดบิล MEA เพื่อแปลงเป็น Excel</p></div>
    <div class="topbar-actions"><a href="{{ url_for('dashboard') }}" class="btn">Dashboard</a><a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a></div>
</header>
<main class="container">
    <section class="card">
        <h2>อัปโหลดไฟล์ MEA</h2>
        <form id="uploadForm" data-bill-type="mea">
            <input type="file" name="files" id="files" accept=".pdf" multiple required>
            <button type="submit" class="btn btn-warning">เริ่มประมวลผล</button>
        </form>
        <div id="result" class="result-box hidden"></div>
    </section>
</main>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body></html>
